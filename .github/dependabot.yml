version: 2
updates:
  # Keep the GitHub Actions used by the workflows current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      actions:
        patterns: ['*']

  # Keep NuGet PackageReferences (test SDK, xunit, coverlet, bunit, Blazor, etc.) current.
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: build(deps)
    groups:
      # Bundle the test toolchain into one PR to cut review noise.
      test-stack:
        patterns:
          - 'xunit*'
          - 'Microsoft.NET.Test.Sdk'
          - 'coverlet*'
          - 'bunit*'
