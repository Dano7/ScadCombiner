name: CodeQL

# Static security/quality analysis of the C# codebase. The bundler parses untrusted .scad input
# (and powers a public web tool), so code scanning is worthwhile. Runs on PRs, pushes to main, and
# weekly to catch newly-published query results against unchanged code.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1' # Mondays 03:27 UTC

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (C#)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write # upload results to the Security tab
      actions: read
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      # The solution includes a Blazor WebAssembly app; CodeQL traces a real build (manual mode below).
      - name: Install wasm-tools workload
        run: dotnet workload install wasm-tools

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          build-mode: manual

      - name: Build
        run: dotnet build ScadBundler.sln -c Release

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: '/language:csharp'
